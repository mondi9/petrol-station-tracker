<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/pwa-192x192.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="description" content="FuelPulse - Real-time fuel availability tracker for Lagos" />
  <link rel="apple-touch-icon" href="/pwa-192x192.png" />
  <title>FuelPulse</title>
  <script>
    function showError(title, details) {
      const overlay = document.createElement('div');
      overlay.style.cssText = `
        position: fixed; inset: 0; background: #0a0a0a; color: white;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        z-index: 100000; padding: 40px; text-align: center; font-family: system-ui, -apple-system, sans-serif;
      `;
      overlay.innerHTML = `
        <div style="font-size: 4rem; margin-bottom: 20px;">🚨</div>
        <h1 style="font-size: 1.5rem; font-weight: 800; color: #ef4444; margin-bottom: 16px;">${title}</h1>
        <p style="opacity: 0.7; margin-bottom: 32px; max-width: 400px; line-height: 1.6;">
          Lagos Petrol Pulse has encountered a connection issue. This usually happens in low-signal areas or during maintenance.
        </p>
        <button onclick="window.location.reload()" style="
          padding: 12px 24px; border-radius: 12px; background: #22c55e; color: black;
          border: none; font-weight: 800; cursor: pointer; font-size: 1rem;
        ">Reload System</button>
        <div style="margin-top: 40px; font-size: 0.7rem; opacity: 0.3; font-family: monospace; max-width: 80vw; overflow: hidden; text-overflow: ellipsis;">
          ${details}
        </div>
      `;
      document.body.appendChild(overlay);
    }
    window.onerror = (msg, src, line, col, err) => showError('Station Connection Down', msg + ' at ' + src + ':' + line);
    window.onunhandledrejection = (e) => showError('Data Sync Interrupted', e.reason ? (e.reason.message || e.reason) : 'Network Timeout');
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
